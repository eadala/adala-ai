kind = "web"
previewPath = "/"
title = "عدالة AI"
version = "1.0.0"
id = "artifacts/adala"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20637

[services.development]
run = "pnpm --filter @workspace/adala run dev"

[services.production.build]
args = [ "sh", "-c", "echo 'frontend pre-built — skipping vite build'" ]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = [ "node", "artifacts/adala/serve.cjs" ]

[services.production.run.env]
PORT = "20637"
NODE_ENV = "production"

[services.production.health.startup]
path = "/"

[services.env]
PORT = "20637"
BASE_PATH = "/"
