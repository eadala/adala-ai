<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta property="og:title" content="عدالة AI" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      (function(){
        /* ── Catch ALL JS errors before React loads ── */
        window.__adalaErrors = [];
        window.addEventListener("error", function(e) {
          window.__adalaErrors.push(e.message || String(e));
          var el = document.getElementById("adala-init-error");
          if (el) {
            el.style.display = "block";
            el.innerHTML = "<b style='color:#ff6b6b'>[JS Error]</b><br>" +
              (e.error ? (e.error.message + "\n" + e.error.stack) : e.message);
          }
        });
        window.addEventListener("unhandledrejection", function(e) {
          window.__adalaErrors.push(String(e.reason));
          var el = document.getElementById("adala-init-error");
          if (el) {
            el.style.display = "block";
            el.innerHTML = "<b style='color:#ff6b6b'>[Promise Error]</b><br>" +
              (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
          }
        });
      })();
    </script>

    <div id="root" style="background:#F8FAFC;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'IBM Plex Sans Arabic',sans-serif;">
      <!-- Shown until React mounts and replaces this content -->
      <div id="adala-loading" style="text-align:center;color:#1A56DB;">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin:0 auto 12px;">
          <circle cx="28" cy="28" r="26" stroke="#1A56DB" stroke-width="2" opacity="0.3"/>
          <path d="M28 8 A20 20 0 0 1 48 28" stroke="#1A56DB" stroke-width="3" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0 28 28" to="360 28 28" dur="1s" repeatCount="indefinite"/>
          </path>
        </svg>
        <div style="font-size:22px;font-weight:700;letter-spacing:1px;color:#1e3a5f;">عدالة AI</div>
        <div style="font-size:13px;color:#6b7280;margin-top:6px;">جاري التحميل…</div>
      </div>
      <!-- Hidden error display — shown only if JS crashes before React mounts -->
      <pre id="adala-init-error" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:#ffffff;color:#ff6b6b;padding:24px;overflow:auto;font-size:12px;white-space:pre-wrap;font-family:monospace;text-align:left;"></pre>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
