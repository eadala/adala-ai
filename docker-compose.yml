##  عدالة AI — Docker Compose للتطوير والاختبار المحلي
##  يشغّل: التطبيق + PostgreSQL + Ollama (نموذج AI محلي)

services:

  # ── التطبيق الرئيسي ────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adala-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://adala:adala_pass@postgres:5432/adala
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      PLATFORM_OWNER_EMAIL: ${PLATFORM_OWNER_EMAIL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-}
      GITHUB_SHA: ${GITHUB_SHA:-}
      GITHUB_REF_NAME: ${GITHUB_REF_NAME:-main}
      DEPLOYMENT_TIMESTAMP: ${DEPLOYMENT_TIMESTAMP:-}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - adala-net
    volumes:
      - app-uploads:/app/uploads

  # ── قاعدة البيانات PostgreSQL ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: adala-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: adala
      POSTGRES_USER: adala
      POSTGRES_PASSWORD: adala_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adala -d adala"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adala-net

  # ── Ollama — نموذج AI محلي (اختياري) ─────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: adala-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - adala-net
    # للاستفادة من GPU (إذا كان متاحاً):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── pgAdmin للإدارة البصرية (اختياري في dev) ─────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: adala-pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@adala.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - adala-net

networks:
  adala-net:
    driver: bridge

volumes:
  postgres-data:
  ollama-models:
  app-uploads:
