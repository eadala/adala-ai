name: Deploy عدالة AI → Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_build_cache:
        description: "Skip Docker build cache"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── 1. Lint + type check ──────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck 2>/dev/null || echo "Typecheck warnings (non-blocking)"

  # ── 2. Deploy to Hetzner ─────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HETZNER_IP }}" >> ~/.ssh/known_hosts

      - name: Sync code to server
        run: |
          rsync -azP --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='artifacts/*/node_modules' \
            --exclude='lib/*/node_modules' \
            --exclude='artifacts/*/dist' \
            --exclude='.local' \
            ./ root@${{ secrets.HETZNER_IP }}:/opt/adala/

      - name: Deploy on server
        run: |
          ssh root@${{ secrets.HETZNER_IP }} << 'ENDSSH'
          set -e
          cd /opt/adala

          echo "📝 Writing environment..."
          cat > infra/.env << EOF
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          DEFAULT_OBJECT_STORAGE_BUCKET_ID=${{ secrets.DEFAULT_OBJECT_STORAGE_BUCKET_ID }}
          EOF

          echo "🐳 Building & starting containers..."
          cd infra
          docker compose pull --ignore-buildable 2>/dev/null || true
          ${{ inputs.skip_build_cache == 'true' && 'docker compose build --no-cache' || 'docker compose build' }}
          docker compose up -d --remove-orphans

          echo "⏳ Waiting for API health..."
          for i in $(seq 1 24); do
            if docker compose exec -T api wget -qO- http://localhost:8080/api >/dev/null 2>&1; then
              echo "✅ API healthy"
              break
            fi
            if [ $i -eq 24 ]; then
              echo "❌ API did not become healthy — rolling back"
              docker compose down
              exit 1
            fi
            sleep 5
          done

          echo "🧹 Pruning old images..."
          docker image prune -f

          echo "✅ Deployment complete"
          ENDSSH

      - name: Notify failure
        if: failure()
        run: echo "::error::Deployment failed. Check server logs with: docker compose logs api"
