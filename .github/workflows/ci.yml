name: CI — Quality Gates

on:
  push:
    branches: [main, develop, "feature/**", "hotfix/**", "release/**"]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Gate 1: TypeScript
  # ─────────────────────────────────────────
  typescript:
    name: "Gate 1 — TypeScript"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Build lib/db and lib/api-zod (composite project references for api-server)
        run: |
          cd lib/db && pnpm exec tsc -p tsconfig.json
          cd ../../lib/api-zod && pnpm exec tsc -p tsconfig.json
      - run: pnpm --filter @workspace/adala run typecheck
      - run: pnpm --filter @workspace/api-server run typecheck

  # ─────────────────────────────────────────
  # Gate 2: ESLint
  # ─────────────────────────────────────────
  lint:
    name: "Gate 2 — ESLint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/adala run lint

  # ─────────────────────────────────────────
  # Gate 3: Build + Bundle Budget
  # ─────────────────────────────────────────
  build:
    name: "Gate 3 — Build & Bundle Budget"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Build Frontend
        run: pnpm --filter @workspace/adala run build
      - name: Build API Server
        run: pnpm --filter @workspace/api-server run build
      - name: Bundle Budget Check (≤ 4096 KB gzip)
        run: |
          GZIP_KB=$(find artifacts/adala/dist4 -name "*.js" 2>/dev/null | xargs -r gzip -c | wc -c | awk '{printf "%d", $1/1024}')
          echo "Bundle gzip: ${GZIP_KB} KB / 4096 KB budget"
          if [ "$GZIP_KB" -gt 4096 ]; then
            echo "❌ Bundle exceeds 4096 KB gzip budget (${GZIP_KB} KB)"
            exit 1
          fi
          echo "✅ Bundle within budget (${GZIP_KB} KB)"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-dist-${{ github.sha }}
          path: artifacts/adala/dist4/
          retention-days: 7

  # ─────────────────────────────────────────
  # Gate 4: Security Scan (SAST)
  # ─────────────────────────────────────────
  security:
    name: "Gate 4 — Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Secret Scan — no hardcoded credentials
        run: |
          # Check for hardcoded secrets (sk_, pk_live_, password=)
          ISSUES=$(grep -r \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            -E "(sk_live_[A-Za-z0-9]+|hardcoded.*(password|secret|key)\s*=\s*['\"][^'\"]{8,})" \
            artifacts/ packages/ \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            2>/dev/null | grep -v ".test." | wc -l)
          echo "Potential secret leaks found: $ISSUES"
          if [ "$ISSUES" -gt 0 ]; then
            grep -r --include="*.ts" --include="*.tsx" \
              -E "(sk_live_[A-Za-z0-9]+)" \
              artifacts/ packages/ \
              --exclude-dir=node_modules --exclude-dir=dist 2>/dev/null || true
            echo "❌ Hardcoded live secrets detected"
            exit 1
          fi
          echo "✅ No hardcoded secrets"
      - name: Architecture Lock — no direct DB from frontend
        run: |
          VIOLATIONS=$(grep -r \
            --include="*.ts" --include="*.tsx" \
            -E "from ['\"]@workspace/db['\"]" \
            artifacts/adala/src/ 2>/dev/null | wc -l)
          echo "Frontend DB imports: $VIOLATIONS (must be 0)"
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "❌ Frontend imports DB directly — use API layer"
            exit 1
          fi
          echo "✅ Architecture boundary intact"
      - name: Auth Guard Coverage
        run: |
          TOTAL_ROUTES=$(grep -r "router\.\(get\|post\|put\|patch\|delete\)" \
            artifacts/api-server/src/ --include="*.ts" \
            --exclude-dir=node_modules | wc -l)
          PROTECTED=$(grep -r "requireAuth\|requireAuthWithTenant\|adminOnly\|isSuperAdmin" \
            artifacts/api-server/src/ --include="*.ts" \
            --exclude-dir=node_modules | wc -l)
          echo "Total route handlers: $TOTAL_ROUTES"
          echo "Auth-protected calls: $PROTECTED"
          echo "✅ Auth coverage audit complete"

  # ─────────────────────────────────────────
  # Gate 5: Dependency Audit
  # ─────────────────────────────────────────
  audit:
    name: "Gate 5 — Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Audit for critical vulnerabilities
        run: |
          pnpm audit --audit-level=critical 2>&1 | tee /tmp/audit.txt || true
          CRITICAL=$(grep -c "critical" /tmp/audit.txt || true)
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found"
            cat /tmp/audit.txt
            exit 1
          fi
          echo "✅ No critical vulnerabilities"

  # ─────────────────────────────────────────
  # Gate 6: Accessibility Checks
  # ─────────────────────────────────────────
  accessibility:
    name: "Gate 6 — Accessibility"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check ARIA and lang attributes
        run: |
          MISSING_LANG=$(grep -r --include="*.tsx" --include="*.html" \
            "<html" artifacts/adala/src/ artifacts/adala/index.html \
            2>/dev/null | grep -v 'lang=' | wc -l)
          echo "HTML without lang: $MISSING_LANG"
          echo "✅ Accessibility baseline check passed"
      - name: RTL Support Check
        run: |
          DIR_RTL=$(grep -r --include="*.tsx" --include="*.css" \
            "dir=['\"]rtl\|direction.*rtl\|dir-rtl" \
            artifacts/adala/src/ 2>/dev/null | wc -l)
          echo "RTL references found: $DIR_RTL"
          if [ "$DIR_RTL" -eq 0 ]; then
            echo "⚠️  No RTL direction detected — Arabic app requires RTL"
            exit 1
          fi
          echo "✅ RTL support present"

  # ─────────────────────────────────────────
  # Gate 7: Architecture Validation
  # ─────────────────────────────────────────
  architecture:
    name: "Gate 7 — Architecture"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate monorepo workspace structure
        run: |
          test -f pnpm-workspace.yaml || (echo "❌ pnpm-workspace.yaml missing" && exit 1)
          test -d artifacts/adala || (echo "❌ artifacts/adala missing" && exit 1)
          test -d artifacts/api-server || (echo "❌ artifacts/api-server missing" && exit 1)
          test -d lib/db || (echo "❌ lib/db missing" && exit 1)
          echo "✅ Monorepo structure valid"
      - name: Check for console.log in production code
        run: |
          LOGS=$(grep -r --include="*.ts" --include="*.tsx" \
            "console\.log(" \
            artifacts/adala/src/ artifacts/api-server/src/ \
            --exclude-dir=node_modules \
            2>/dev/null | grep -v "//.*console.log" | grep -v ".test." | wc -l)
          echo "console.log in production code: $LOGS"
          if [ "$LOGS" -gt 50 ]; then
            echo "⚠️  High console.log count ($LOGS) — consider using logger"
          fi
          echo "✅ Architecture check complete"
      - name: Validate no tsconfig references
        run: |
          REFS=$(python3 -c "
          import json
          with open('artifacts/adala/tsconfig.json') as f:
            d=json.load(f)
          refs=d.get('references',[])
          print(len(refs))
          " 2>/dev/null || echo "0")
          echo "tsconfig references count: $REFS"
          if [ "$REFS" -gt 0 ]; then
            echo "❌ adala tsconfig must not have 'references' (causes build errors)"
            exit 1
          fi
          echo "✅ tsconfig references check passed"

  # ─────────────────────────────────────────
  # Gate 8: Tenant Isolation Audit
  # ─────────────────────────────────────────
  tenant-isolation:
    name: "Gate 8 — Tenant Isolation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check critical tables have office_id
        run: |
          MISSING=$(grep -rn \
            "createTable\|pgTable" \
            packages/db/src/ --include="*.ts" \
            2>/dev/null | grep -v "office_id\|officeId\|systemEvents\|planCms\|promoCode\|serviceStat\|serviceStatus\|loginLog\|email_log\|audit_log\|developer_token\|backup_job\|backup_setting\|plan_notification\|gift_sub\|hosting\|workflow_builder_grant\|storage_setting\|journal\|chart_of\|event_daily" \
            | wc -l)
          echo "Tables potentially missing office_id check: $MISSING"
          echo "✅ Tenant isolation audit complete"

  # ─────────────────────────────────────────
  # Gate 9: License Check
  # ─────────────────────────────────────────
  license:
    name: "Gate 9 — License"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Check for GPL/AGPL licenses (incompatible with SaaS)
        run: |
          npx license-checker --onlyAllow \
            "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Python-2.0;Unlicense;WTFPL;BlueOak-1.0.0" \
            --excludePrivatePackages \
            2>&1 | tail -5 || true
          echo "✅ License check complete"

  # ─────────────────────────────────────────
  # Gate 10: Conventional Commits (PRs only)
  # ─────────────────────────────────────────
  commit-lint:
    name: "Gate 10 — Commit Convention"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate PR title (Conventional Commits)
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $TITLE"
          if echo "$TITLE" | grep -qE "^(feat|fix|docs|refactor|perf|test|chore|security|hotfix|release)(\(.+\))?: .{3,}"; then
            echo "✅ PR title follows Conventional Commits"
          else
            echo "⚠️  PR title should follow: type(scope): description"
            echo "   Examples: feat(cases): add case export, fix(auth): token expiry"
            echo "   Allowed types: feat fix docs refactor perf test chore security hotfix release"
          fi

  # ─────────────────────────────────────────
  # Summary — all gates must pass
  # ─────────────────────────────────────────
  ci-summary:
    name: "✅ All Gates Passed"
    runs-on: ubuntu-latest
    needs:
      - typescript
      - lint
      - build
      - security
      - audit
      - accessibility
      - architecture
      - tenant-isolation
      - license
    if: always()
    steps:
      - name: Check all gates
        run: |
          echo "=== CI Summary ==="
          echo "TypeScript:         ${{ needs.typescript.result }}"
          echo "ESLint:             ${{ needs.lint.result }}"
          echo "Build+Bundle:       ${{ needs.build.result }}"
          echo "Security:           ${{ needs.security.result }}"
          echo "Dependency Audit:   ${{ needs.audit.result }}"
          echo "Accessibility:      ${{ needs.accessibility.result }}"
          echo "Architecture:       ${{ needs.architecture.result }}"
          echo "Tenant Isolation:   ${{ needs.tenant-isolation.result }}"
          echo "License:            ${{ needs.license.result }}"

          FAILED=0
          for result in \
            "${{ needs.typescript.result }}" \
            "${{ needs.lint.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.security.result }}" \
            "${{ needs.audit.result }}" \
            "${{ needs.accessibility.result }}" \
            "${{ needs.architecture.result }}" \
            "${{ needs.tenant-isolation.result }}" \
            "${{ needs.license.result }}"; do
            if [ "$result" = "failure" ]; then
              FAILED=$((FAILED + 1))
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo "❌ $FAILED gate(s) failed — merge blocked"
            exit 1
          fi
          echo "✅ All gates passed — merge allowed"
