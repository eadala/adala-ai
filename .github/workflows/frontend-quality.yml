name: Frontend Quality Gate

on:
  push:
    branches: [main]
    paths:
      - "artifacts/adala/src/**"
      - "artifacts/adala/eslint.config.js"
      - "artifacts/adala/tsconfig.json"
      - "artifacts/adala/vite.config.ts"
      - "lib/api-client-react/src/**"
      - "lib/object-storage-web/src/**"
  pull_request:
    branches: [main]
    paths:
      - "artifacts/adala/src/**"
      - "lib/api-client-react/src/**"
      - "lib/object-storage-web/src/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Gate 1: TypeScript + ESLint
  # Pipeline order: Install → TypeCheck → Lint
  #
  # Design note — why no "build shared libs" step:
  #   lib/api-client-react and lib/object-storage-web export their TypeScript
  #   source directly via package.json "exports": "./src/index.ts".
  #   TypeScript resolves them at source level (allowImportingTsExtensions +
  #   moduleResolution:bundler). No dist build is needed for type-checking.
  # ────────────────────────────────────────────────────────────────────────────
  lint-typecheck:
    name: "TypeScript & ESLint"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (0 errors required)
        working-directory: artifacts/adala
        run: pnpm typecheck

      - name: ESLint (0 errors required)
        working-directory: artifacts/adala
        run: pnpm lint --max-warnings=9999

  # ────────────────────────────────────────────────────────────────────────────
  # Gate 2: Architecture Lock
  # ────────────────────────────────────────────────────────────────────────────
  architecture-lock:
    name: "Architecture Lock"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Check: No raw Dialog/DialogContent imports in pages/features"
        run: |
          HITS=$(grep -rn "from \"@/components/ui/dialog\"" \
            artifacts/adala/src/pages artifacts/adala/src/features \
            --include="*.tsx" 2>/dev/null \
            | grep -oP "import \{[^}]+\}" \
            | grep -cE "\bDialog[^A-Za-z]|\bDialogContent\b" || echo "0")
          echo "Raw Dialog/DialogContent imports in pages/features: $HITS"
          if [ "$HITS" -gt 0 ]; then
            echo "::error::Architecture Lock violated: use AdaptiveDialog + AdaptiveDialogContent from @/components/adaptive"
            exit 1
          fi

      - name: "Check: No console.log in pages/features"
        run: |
          HITS=$(grep -rn "console\.log" \
            artifacts/adala/src/pages artifacts/adala/src/features \
            --include="*.tsx" --include="*.ts" 2>/dev/null \
            | grep -v "^.*\/\/.*console\.log" | wc -l || echo "0")
          echo "console.log calls in pages/features: $HITS"
          if [ "$HITS" -gt 0 ]; then
            echo "::error::console.log found in production pages — remove or replace with console.warn/error"
            grep -rn "console\.log" artifacts/adala/src/pages artifacts/adala/src/features \
              --include="*.tsx" | head -5
            exit 1
          fi

      - name: "Check: No debugger statements"
        run: |
          HITS=$(grep -rn "\bdebugger\b" artifacts/adala/src \
            --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l || echo "0")
          echo "debugger statements: $HITS"
          if [ "$HITS" -gt 0 ]; then
            echo "::error::debugger statement found in source code"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Gate 3: Build + Bundle Size Budget
  # Pipeline order: Install → Build → Bundle Audit
  #
  # Budget: 4096 KB measured as gzip-compressed total JS size.
  # Rationale: gzip is the actual bytes downloaded by end-users (HTTP/2 +
  # Content-Encoding: gzip). Raw filesystem size (du -k) inflates by block
  # alignment and misrepresents real-world network cost. Industry standard
  # tools (Lighthouse, webpack-bundle-analyzer) measure gzip.
  # ────────────────────────────────────────────────────────────────────────────
  build-budget:
    name: "Build & Bundle Budget"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: artifacts/adala
        run: pnpm build
        env:
          BASE_PATH: "/"
          NODE_ENV: production

      - name: Bundle size budget check (4096 KB gzip limit)
        working-directory: artifacts/adala
        run: |
          BUDGET_KB=4096
          # gzip-compressed size = actual bytes users download over the network
          GZIP_KB=$(find dist/public/assets -name "*.js" -exec gzip -c {} \; \
            | wc -c | awk '{printf "%d", $1/1024}')
          RAW_KB=$(find dist/public/assets -name "*.js" -exec cat {} \; \
            | wc -c | awk '{printf "%d", $1/1024}')
          echo "Bundle: gzip=${GZIP_KB}KB | raw=${RAW_KB}KB | budget=${BUDGET_KB}KB (gzip)"
          echo "--- Top 15 chunks by raw size ---"
          find dist/public/assets -name "*.js" -exec du -kh {} + \
            | sort -rh | head -15
          if [ "$GZIP_KB" -gt "$BUDGET_KB" ]; then
            echo "::error::Bundle (gzip) ${GZIP_KB}KB exceeds budget of ${BUDGET_KB}KB"
            exit 1
          fi
          echo "::notice::Bundle PASSED: ${GZIP_KB}KB gzip (budget ${BUDGET_KB}KB)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-build
          path: artifacts/adala/dist/public
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Gate 4: UI Governance Audit
  # ────────────────────────────────────────────────────────────────────────────
  ui-audit:
    name: "UI Governance Audit"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run UI Audit (fail on issues)
        run: node scripts/governance/ui-audit.mjs --fail-on-issues

  # ────────────────────────────────────────────────────────────────────────────
  # Gate 5: Accessibility Smoke Check
  # ────────────────────────────────────────────────────────────────────────────
  accessibility:
    name: "Accessibility Checks"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Check: img elements have alt attributes"
        run: |
          HITS=$(grep -rn "<img " artifacts/adala/src --include="*.tsx" \
            | grep -v "alt=" | grep -v "//" | wc -l || echo "0")
          echo "img without alt: $HITS"
          if [ "$HITS" -gt 0 ]; then
            echo "::warning::$HITS <img> element(s) missing alt attribute (WCAG 1.1.1)"
          fi

      - name: "Check: Buttons have accessible content"
        run: |
          EMPTY_BTNS=$(grep -rn "<Button[^>]*>\s*</" artifacts/adala/src --include="*.tsx" \
            | grep -v "//\|aria-label\|title=" | wc -l || echo "0")
          echo "Potentially empty buttons: $EMPTY_BTNS"
