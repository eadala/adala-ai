server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  # ── تجميع لوقات Docker containers تلقائياً ───────────
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]
    relabel_configs:
      # اسم الـ container كـ label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # اسم الـ service في compose
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      # لا نريد لوقات Promtail نفسه
      - source_labels: [container]
        regex: "adala-promtail"
        action: drop

    pipeline_stages:
      # ── للـ API: parse JSON من pino ──────────────────
      - match:
          selector: '{service="api"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
                  req_id: reqId
                  tenant: tenant
                  err: err
            - labels:
                level:
                service:
            - output:
                source: msg

      # ── لكل الـ containers: timestamp صحيح ───────────
      - timestamp:
          source: time
          format: RFC3339Nano
          action_on_failure: skip
