global:
  resolve_timeout: 5m
  smtp_from: "alerts@adala.ai"
  smtp_smarthost: "${SMTP_HOST:-smtp.gmail.com}:587"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true

# ── توجيه التنبيهات ───────────────────────────────────────
route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "warning"

receivers:
  # ── تنبيهات بريد إلكتروني (الافتراضي) ────────────────
  - name: "default"
    email_configs:
      - to: "${ALERT_EMAIL:-admin@adala.ai}"
        send_resolved: true
        headers:
          Subject: "[عدالة AI] {{ .GroupLabels.alertname }}"
        body: |
          {{ range .Alerts }}
          ⚠️  {{ .Annotations.summary }}
          الخطورة: {{ .Labels.severity }}
          الوقت: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
          {{ end }}

  # ── تنبيهات حرجة (email + Slack) ─────────────────────
  - name: "critical"
    email_configs:
      - to: "${ALERT_EMAIL:-admin@adala.ai}"
        send_resolved: true
        headers:
          Subject: "🚨 [CRITICAL] عدالة AI — {{ .GroupLabels.alertname }}"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#alerts"
        send_resolved: true
        icon_emoji: ":rotating_light:"
        title: "🚨 {{ .GroupLabels.alertname }}"
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          الخطورة: `{{ .Labels.severity }}`
          {{ end }}

  # ── تنبيهات تحذيرية (Slack فقط) ──────────────────────
  - name: "warning"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#monitoring"
        send_resolved: true
        icon_emoji: ":warning:"
        title: "⚠️  {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
