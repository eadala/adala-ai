global:
  resolve_timeout: 5m
  smtp_from: "alerts@adala.ai"
  smtp_smarthost: "${SMTP_HOST:-smtp.gmail.com}:587"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true

# ── توجيه التنبيهات (مع noise control) ──────────────────────
route:
  group_by: ["alertname", "severity"]
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h
      continue: true      # أكمل للـ auto-heal أيضاً

    - match:
        severity: critical
        alertname: APIDown
      receiver: "auto-heal-api"
      repeat_interval: 5m

    - match:
        severity: warning
      receiver: "warning"
      repeat_interval: 6h

receivers:
  # ── default (email) ────────────────────────────────────
  - name: "default"
    email_configs:
      - to: "${ALERT_EMAIL:-admin@adala.ai}"
        send_resolved: true
        headers:
          Subject: "[عدالة AI] {{ .GroupLabels.alertname }}"
        body: |
          {{ range .Alerts }}
          {{ if eq .Status "firing" }}⚠️  تنبيه جديد{{ else }}✅ تم الحل{{ end }}
          التنبيه: {{ .Annotations.summary }}
          الخطورة: {{ .Labels.severity }}
          الوقت: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
          {{ end }}

  # ── critical (email + Slack) ────────────────────────────
  - name: "critical"
    email_configs:
      - to: "${ALERT_EMAIL:-admin@adala.ai}"
        send_resolved: true
        headers:
          Subject: "🚨 [CRITICAL] عدالة AI — {{ .GroupLabels.alertname }}"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#alerts"
        send_resolved: true
        icon_emoji: ":rotating_light:"
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: '{{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ if .Annotations.description }}_{{ .Annotations.description }}_{{ end }}
          {{ end }}

  # ── warning (Slack فقط) ─────────────────────────────────
  - name: "warning"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#monitoring"
        send_resolved: true
        icon_emoji: ":warning:"
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        title: '⚠️  {{ .GroupLabels.alertname }}'
        text: "{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}"

  # ── auto-heal: webhook يُعيد تشغيل API عند الانهيار ──────
  - name: "auto-heal-api"
    webhook_configs:
      - url: "http://api:8080/internal/heal"
        send_resolved: false
        http_config:
          bearer_token: "${HEAL_SECRET:-adala-heal-token}"
        max_alerts: 1

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
