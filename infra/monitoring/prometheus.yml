global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: adala-ai
    env: production

# ── Alertmanager ──────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# ── قواعد التنبيه ──────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: adala_api
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: adala-api

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
