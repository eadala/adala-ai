upstream api_backend {
    server api:8080;
    keepalive 32;
}

upstream web_frontend {
    server web:3000;
    keepalive 16;
}

# ── Security headers (مشترك بين جميع responses) ──────────
map $sent_http_content_type $csp_header {
    default "default-src 'self'; script-src 'self' 'unsafe-inline' https://clerk.accounts.dev https://*.clerk.accounts.dev https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; frame-src https://js.stripe.com https://clerk.accounts.dev https://*.clerk.accounts.dev; object-src 'none'; base-uri 'self';";
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy $csp_header always;

    # ── Let's Encrypt validation ──────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── SSE — long-lived connections (لا buffering) ───────
    location /api/events/stream {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
        # لا security headers على SSE لتجنب قطع الاتصال
        add_header Cache-Control "no-cache" always;
    }

    # ── Prometheus metrics — مغلق من الخارج ─────────────
    location /metrics {
        return 403;
    }

    # ── جميع routes الـ API ───────────────────────────────
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Frontend SPA ──────────────────────────────────────
    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
