version: "3.9"

services:
  # ── PostgreSQL (UUID-native) ──────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: adala-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: adala
      POSTGRES_USER: adala
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adala -d adala"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: adala-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ── API Server ────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: adala-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://adala:${DB_PASSWORD}@db:5432/adala
      REDIS_URL: redis://redis:6379
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      DEFAULT_OBJECT_STORAGE_BUCKET_ID: ${DEFAULT_OBJECT_STORAGE_BUCKET_ID:-}
      PRIVATE_OBJECT_DIR: ${PRIVATE_OBJECT_DIR:-/data/uploads}
      PUBLIC_OBJECT_SEARCH_PATHS: ${PUBLIC_OBJECT_SEARCH_PATHS:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # ── Frontend (SPA) ────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
        VITE_CLERK_PROXY_URL: /api/__clerk
        BASE_PATH: /
    container_name: adala-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal

  # ── Nginx Gateway (public entry point) ───────────────────
  gateway:
    image: nginx:1.27-alpine
    container_name: adala-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - internal
      - external

  # ── Certbot (SSL) ─────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: adala-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ═══════════════════════════════════════════════════════════
  # OBSERVABILITY STACK
  # وصول: SSH tunnel فقط (لا يُعرَّض للإنترنت)
  # ssh -L 9090:localhost:9090 -L 3001:localhost:3001 root@SERVER_IP
  # ═══════════════════════════════════════════════════════════

  # ── Prometheus (scrape metrics) ───────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: adala-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      - api
    networks:
      - internal

  # ── Grafana (dashboards) ──────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: adala-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-adala_monitor_2024}
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - internal

  # ── Redis Exporter (metrics for Prometheus) ───────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: adala-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    networks:
      - internal

  # ── PostgreSQL Exporter ───────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: adala-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://adala:${DB_PASSWORD}@db:5432/adala?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── Node Exporter (host OS metrics) ──────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: adala-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  uploads:
  certbot_www:
  certbot_conf:
  prometheusdata:
  grafanadata:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
