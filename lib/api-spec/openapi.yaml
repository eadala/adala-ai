openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: عدالة AI - Legal SaaS Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cases
    description: Case management
  - name: documents
    description: Document management
  - name: tasks
    description: AI task engine
  - name: users
    description: User management
  - name: messages
    description: Messaging (WhatsApp/Email)
  - name: billing
    description: Billing and subscriptions
  - name: dashboard
    description: Dashboard summaries and stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── CASES ───────────────────────────────────────────────
  /cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: List all cases
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: caseType
          schema:
            type: string
      responses:
        "200":
          description: List of cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Case"
    post:
      operationId: createCase
      tags: [cases]
      summary: Create a new case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"

  /cases/{id}:
    get:
      operationId: getCase
      tags: [cases]
      summary: Get case by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Case details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
    patch:
      operationId: updateCase
      tags: [cases]
      summary: Update a case
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseUpdate"
      responses:
        "200":
          description: Updated case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
    delete:
      operationId: deleteCase
      tags: [cases]
      summary: Delete a case
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── DOCUMENTS ────────────────────────────────────────────
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - in: query
          name: caseId
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Upload a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── AI TASKS ─────────────────────────────────────────────
  /tasks:
    get:
      operationId: listAiTasks
      tags: [tasks]
      summary: List AI tasks
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: caseId
          schema:
            type: string
      responses:
        "200":
          description: List of AI tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiTask"
    post:
      operationId: createAiTask
      tags: [tasks]
      summary: Submit a new AI task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiTaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiTask"

  /tasks/{id}:
    get:
      operationId: getAiTask
      tags: [tasks]
      summary: Get AI task by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiTask"

  # ── USERS ─────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── MESSAGES ─────────────────────────────────────────────
  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List messages
      parameters:
        - in: query
          name: caseId
          schema:
            type: string
        - in: query
          name: channel
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # ── BILLING ─────────────────────────────────────────────
  /billing/invoices:
    get:
      operationId: listInvoices
      tags: [billing]
      summary: List invoices
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

  /billing/subscription:
    get:
      operationId: getSubscription
      tags: [billing]
      summary: Get current subscription
      responses:
        "200":
          description: Current subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /billing/usage:
    get:
      operationId: getUsage
      tags: [billing]
      summary: Get usage logs
      responses:
        "200":
          description: Usage data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UsageLog"

  # ── DASHBOARD ─────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/case-breakdown:
    get:
      operationId: getCaseBreakdown
      tags: [dashboard]
      summary: Get case status breakdown
      responses:
        "200":
          description: Case breakdown by status and type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseBreakdown"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── CASES ──
    Case:
      type: object
      required: [id, title, caseType, status, createdAt]
      properties:
        id:          { type: string }
        title:       { type: string }
        description: { type: ["string", "null"] }
        caseType:    { type: string }
        status:      { type: string }
        clientName:  { type: ["string", "null"] }
        assignedTo:  { type: ["string", "null"] }
        createdAt:   { type: string }
        updatedAt:   { type: ["string", "null"] }

    CaseInput:
      type: object
      required: [title, caseType]
      properties:
        title:       { type: string, minLength: 1 }
        description: { type: string }
        caseType:    { type: string }
        status:      { type: string }
        clientName:  { type: string }
        assignedTo:  { type: string }

    CaseUpdate:
      type: object
      properties:
        title:       { type: string }
        description: { type: string }
        caseType:    { type: string }
        status:      { type: string }
        clientName:  { type: string }
        assignedTo:  { type: string }

    # ── DOCUMENTS ──
    Document:
      type: object
      required: [id, fileUrl, fileType, createdAt]
      properties:
        id:        { type: string }
        caseId:    { type: ["string", "null"] }
        caseName:  { type: ["string", "null"] }
        fileUrl:   { type: string }
        fileType:  { type: string }
        fileName:  { type: ["string", "null"] }
        ocrText:   { type: ["string", "null"] }
        aiSummary: { type: ["string", "null"] }
        createdAt: { type: string }

    DocumentInput:
      type: object
      required: [fileUrl, fileType, fileName]
      properties:
        caseId:   { type: string }
        fileUrl:  { type: string }
        fileType: { type: string }
        fileName: { type: string }

    # ── AI TASKS ──
    AiTask:
      type: object
      required: [id, type, status, createdAt]
      properties:
        id:         { type: string }
        caseId:     { type: ["string", "null"] }
        caseName:   { type: ["string", "null"] }
        documentId: { type: ["string", "null"] }
        type:       { type: string }
        status:     { type: string }
        priority:   { type: integer }
        inputText:  { type: ["string", "null"] }
        outputText: { type: ["string", "null"] }
        createdAt:  { type: string }

    AiTaskInput:
      type: object
      required: [type]
      properties:
        caseId:     { type: string }
        documentId: { type: string }
        type:       { type: string }
        inputText:  { type: string }
        priority:   { type: integer }

    # ── USERS ──
    User:
      type: object
      required: [id, email, fullName, status, role, createdAt]
      properties:
        id:        { type: string }
        email:     { type: string }
        fullName:  { type: string }
        phone:     { type: ["string", "null"] }
        status:    { type: string }
        role:      { type: string }
        createdAt: { type: string }

    UserInput:
      type: object
      required: [email, fullName, role]
      properties:
        email:    { type: string }
        fullName: { type: string }
        phone:    { type: string }
        role:     { type: string }
        status:   { type: string }

    UserUpdate:
      type: object
      properties:
        fullName: { type: string }
        phone:    { type: string }
        role:     { type: string }
        status:   { type: string }

    # ── MESSAGES ──
    Message:
      type: object
      required: [id, channel, direction, content, status, createdAt]
      properties:
        id:        { type: string }
        caseId:    { type: ["string", "null"] }
        caseName:  { type: ["string", "null"] }
        channel:   { type: string }
        direction: { type: string }
        content:   { type: string }
        status:    { type: string }
        createdAt: { type: string }

    MessageInput:
      type: object
      required: [channel, content]
      properties:
        caseId:  { type: string }
        channel: { type: string }
        content: { type: string }

    # ── BILLING ──
    Invoice:
      type: object
      required: [id, amount, status, createdAt]
      properties:
        id:        { type: string }
        amount:    { type: number }
        status:    { type: string }
        createdAt: { type: string }

    Subscription:
      type: object
      required: [id, planName, status, startDate, endDate]
      properties:
        id:        { type: string }
        planName:  { type: string }
        planPrice: { type: number }
        status:    { type: string }
        startDate: { type: string }
        endDate:   { type: string }

    UsageLog:
      type: object
      required: [id, feature, units, cost, createdAt]
      properties:
        id:        { type: string }
        feature:   { type: string }
        units:     { type: integer }
        cost:      { type: number }
        createdAt: { type: string }

    # ── DASHBOARD ──
    DashboardStats:
      type: object
      required: [totalCases, openCases, totalDocuments, aiTasksCompleted, activeUsers, monthlyRevenue]
      properties:
        totalCases:       { type: integer }
        openCases:        { type: integer }
        totalDocuments:   { type: integer }
        aiTasksCompleted: { type: integer }
        activeUsers:      { type: integer }
        monthlyRevenue:   { type: number }
        casesThisMonth:   { type: integer }
        docsThisMonth:    { type: integer }

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:          { type: string }
        type:        { type: string }
        description: { type: string }
        entityId:    { type: ["string", "null"] }
        createdAt:   { type: string }

    CaseBreakdown:
      type: object
      required: [byStatus, byType]
      properties:
        byStatus:
          type: array
          items:
            type: object
            required: [label, count]
            properties:
              label: { type: string }
              count: { type: integer }
        byType:
          type: array
          items:
            type: object
            required: [label, count]
            properties:
              label: { type: string }
              count: { type: integer }
